# Configuration V1 du systeme de recommandation flou.
#
# Ce fichier documente les parametres V1 utilises par les variables
# linguistiques implementees dans `src/fuzzy/linguistic_variables.py`.

project:
  name: fuzzyrec
  version: 1

dataset:
  raw_dir: data/movie
  processed_dir: data/processed
  files:
    movies: movies.csv
    ratings: ratings.csv
    tags: tags.csv
    links: links.csv

fuzzy_system:
  inference_model: mamdani
  ruleset: minimal_v1
  defuzzification_method: centroid
  preferred_genre_threshold: 0.2
  neutral_average_rating: 3.5

variables:
  genre_preference:
    universe: [0.0, 1.0]
    terms:
      faible:
        type: trapezoidal
        parameters: [0.0, 0.0, 0.2, 0.45]
      moyenne:
        type: triangular
        parameters: [0.3, 0.5, 0.7]
      forte:
        type: trapezoidal
        parameters: [0.55, 0.8, 1.0, 1.0]
  average_rating:
    universe: [0.5, 5.0]
    terms:
      mauvaise:
        type: trapezoidal
        parameters: [0.5, 0.5, 1.5, 2.5]
      correcte:
        type: triangular
        parameters: [2.0, 3.0, 3.8]
      bonne:
        type: triangular
        parameters: [3.2, 3.8, 4.5]
      excellente:
        type: trapezoidal
        parameters: [4.0, 4.5, 5.0, 5.0]
  popularity:
    universe: [0, 350]
    terms:
      confidentiel:
        type: trapezoidal
        parameters: [0, 0, 10, 30]
      modere:
        type: triangular
        parameters: [20, 60, 120]
      populaire:
        type: triangular
        parameters: [80, 150, 250]
      tres_populaire:
        type: trapezoidal
        parameters: [200, 280, 350, 350]
  recommendation_score:
    universe: [0.0, 1.0]
    role: output
    terms:
      tres_faible:
        type: trapezoidal
        parameters: [0.0, 0.0, 0.1, 0.25]
      faible:
        type: triangular
        parameters: [0.15, 0.3, 0.45]
      moyen:
        type: triangular
        parameters: [0.35, 0.5, 0.65]
      fort:
        type: triangular
        parameters: [0.55, 0.7, 0.85]
      tres_fort:
        type: trapezoidal
        parameters: [0.75, 0.9, 1.0, 1.0]

rule_base:
  minimal_v1:
    expected_rule_count: 8
    status: "Implemented in src/fuzzy/rule_base.py"
    variables: [genre_preference, average_rating, popularity]
    output: recommendation_score
    rules:
      - id: R1
        description: "Preference de genre forte, note excellente et popularite tres elevee : recommandation maximale."
        if:
          genre_preference: forte
          average_rating: excellente
          popularity: tres_populaire
        then:
          recommendation_score: tres_fort
      - id: R2
        description: "Un film excellent dans un genre tres apprecie reste fortement recommande meme s'il est confidentiel."
        if:
          genre_preference: forte
          average_rating: excellente
          popularity: confidentiel
        then:
          recommendation_score: fort
      - id: R3
        description: "Genre tres apprecie, bonne note et popularite solide : recommandation forte."
        if:
          genre_preference: forte
          average_rating: bonne
          popularity: populaire
        then:
          recommendation_score: fort
      - id: R4
        description: "Interet de genre moyen compense par une excellente note et une tres forte popularite."
        if:
          genre_preference: moyenne
          average_rating: excellente
          popularity: tres_populaire
        then:
          recommendation_score: fort
      - id: R5
        description: "Situation equilibree : preference, note et popularite restent intermediaires."
        if:
          genre_preference: moyenne
          average_rating: bonne
          popularity: modere
        then:
          recommendation_score: moyen
      - id: R6
        description: "Genre peu apprecie mais film excellent et tres populaire : recommandation prudente."
        if:
          genre_preference: faible
          average_rating: excellente
          popularity: tres_populaire
        then:
          recommendation_score: moyen
      - id: R7
        description: "La preference de genre ne suffit pas a compenser une mauvaise note, meme avec popularite."
        if:
          genre_preference: forte
          average_rating: mauvaise
          popularity: populaire
        then:
          recommendation_score: faible
      - id: R8
        description: "Genre peu apprecie, mauvaise note et faible visibilite : recommandation tres faible."
        if:
          genre_preference: faible
          average_rating: mauvaise
          popularity: confidentiel
        then:
          recommendation_score: tres_faible
  intermediate:
    expected_rule_count: 20
    rules: []
    todo: "Extension prevue apres validation de la V1 minimale."

explanation:
  activation_threshold: 0.1
  todo: "Brancher les regles activees et les degres linguistiques dominants."

visualization:
  output_dir: reports/figures
  status: "Outils matplotlib disponibles dans src/visualization/membership_plots.py."
