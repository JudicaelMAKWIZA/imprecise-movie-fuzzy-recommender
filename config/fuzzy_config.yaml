# Configuration V1 du systeme de recommandation flou.
#
# Ce fichier documente les parametres V1 utilises par les variables
# linguistiques implementees dans `src/fuzzy/linguistic_variables.py`.

project:
  name: fuzzyrec
  version: 1

dataset:
  raw_dir: data/movie
  processed_dir: data/processed
  files:
    movies: movies.csv
    ratings: ratings.csv
    tags: tags.csv
    links: links.csv

fuzzy_system:
  inference_model: mamdani
  ruleset: minimal_v1
  defuzzification_method: centroid

variables:
  genre_preference:
    universe: [0.0, 1.0]
    terms:
      faible:
        type: trapezoidal
        parameters: [0.0, 0.0, 0.2, 0.45]
      moyenne:
        type: triangular
        parameters: [0.3, 0.5, 0.7]
      forte:
        type: trapezoidal
        parameters: [0.55, 0.8, 1.0, 1.0]
  average_rating:
    universe: [0.5, 5.0]
    terms:
      mauvaise:
        type: trapezoidal
        parameters: [0.5, 0.5, 1.5, 2.5]
      correcte:
        type: triangular
        parameters: [2.0, 3.0, 3.8]
      bonne:
        type: triangular
        parameters: [3.2, 3.8, 4.5]
      excellente:
        type: trapezoidal
        parameters: [4.0, 4.5, 5.0, 5.0]
  popularity:
    universe: [0, 350]
    terms:
      confidentiel:
        type: trapezoidal
        parameters: [0, 0, 10, 30]
      modere:
        type: triangular
        parameters: [20, 60, 120]
      populaire:
        type: triangular
        parameters: [80, 150, 250]
      tres_populaire:
        type: trapezoidal
        parameters: [200, 280, 350, 350]

rule_base:
  minimal_v1:
    expected_rule_count: 8
    rules: []
    todo: "Declarer les 8 regles initiales sans modifier leur interpretabilite."
  intermediate:
    expected_rule_count: 20
    rules: []
    todo: "Extension prevue apres validation de la V1 minimale."

explanation:
  activation_threshold: 0.1
  todo: "Brancher les regles activees et les degres linguistiques dominants."

visualization:
  output_dir: reports/figures
  status: "Outils matplotlib disponibles dans src/visualization/membership_plots.py."
